# Cross-compilation config for ARM64 (Raspberry Pi 3B)

[target.aarch64-unknown-linux-gnu]
# Use the ARM64 linker
linker = "aarch64-linux-gnu-gcc"
# Optimization for ARMv8 Cortex-A53
rustflags = ["-C", "target-feature=+crc"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
